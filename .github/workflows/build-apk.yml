name: Build Android APK (Optimized)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.8
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer
        pip install cython
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          openjdk-11-jdk \
          build-essential \
          python3-dev \
          python3-pip \
          libffi-dev \
          libssl-dev \
          libxml2-dev \
          libxslt1-dev \
          zlib1g-dev \
          autoconf \
          libtool \
          pkg-config \
          libncurses5-dev \
          libncursesw5-dev \
          cmake \
          libltdl-dev
        
    - name: Build APK
      run: |
        buildozer android debug 2>&1 | tee build.log
        echo "Build completed with exit code: $?"
        
    - name: Find APK files
      id: find_apk
      run: |
        echo "=== Searching for APK files ==="
        APK_FILES=$(find . -name "*.apk" -type f 2>/dev/null)
        
        if [ -z "$APK_FILES" ]; then
          echo "No APK files found!"
          echo "apk_found=false" >> $GITHUB_OUTPUT
          exit 1
        fi
        
        echo "Found APK files:"
        echo "$APK_FILES"
        
        # Get the first APK file path
        FIRST_APK=$(echo "$APK_FILES" | head -n 1)
        echo "First APK: $FIRST_APK"
        
        # Get the directory containing the APK
        APK_DIR=$(dirname "$FIRST_APK")
        echo "APK directory: $APK_DIR"
        
        # List all files in the APK directory
        echo "Files in APK directory:"
        ls -la "$APK_DIR"
        
        # Set output variables
        echo "apk_dir=$APK_DIR" >> $GITHUB_OUTPUT
        echo "apk_found=true" >> $GITHUB_OUTPUT
        
    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        
    - name: Upload APK files
      if: success() && steps.find_apk.outputs.apk_found == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: fileserver-apk
        path: ${{ steps.find_apk.outputs.apk_dir }}/*.apk
        retention-days: 30
        if-no-files-found: error
