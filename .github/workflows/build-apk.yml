name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.8
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer
        pip install cython
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git openjdk-11-jdk build-essential python3-dev python3-pip libffi-dev libssl-dev libxml2-dev libxslt1-dev zlib1g-dev autoconf libtool pkg-config libncurses5-dev libncursesw5-dev cmake libltdl-dev
        
    - name: Setup Android SDK
      run: |
        # Create Android SDK directory
        mkdir -p /home/runner/android-sdk
        
        # Download and install Android SDK Command Line Tools
        cd /home/runner/android-sdk
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-11076708_latest.zip
        rm commandlinetools-linux-11076708_latest.zip
        
        # Set up SDK tools directory structure
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/bin cmdline-tools/latest/
        mv cmdline-tools/lib cmdline-tools/latest/
        
        # Set PATH
        export ANDROID_SDK_ROOT=/home/runner/android-sdk
        export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
        
        # Accept SDK licenses
        yes | sdkmanager --licenses
        
        # Install required components
        sdkmanager "build-tools;33.0.0"
        sdkmanager "platform-tools"
        sdkmanager "platforms;android-33"
        
        # Create buildozer directories
        mkdir -p /home/runner/.buildozer/android/platform/
        
        # Remove existing symlink if it exists
        if [ -L /home/runner/.buildozer/android/platform/android-sdk ]; then
          rm /home/runner/.buildozer/android/platform/android-sdk
        fi
        
        # Create symlink for buildozer
        ln -s /home/runner/android-sdk /home/runner/.buildozer/android/platform/android-sdk
        
        # Verify installation
        echo "=== SDK installation verification ==="
        ls -la /home/runner/android-sdk/
        ls -la /home/runner/android-sdk/build-tools/
        ls -la /home/runner/android-sdk/build-tools/33.0.0/
        echo "=== Buildozer directory verification ==="
        ls -la /home/runner/.buildozer/android/platform/
        ls -la /home/runner/.buildozer/android/platform/android-sdk/
        ls -la /home/runner/.buildozer/android/platform/android-sdk/build-tools/
        
    - name: Build APK
      run: |
        export ANDROID_SDK_ROOT=/home/runner/android-sdk
        export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
        # Set build-tools version explicitly
        export ANDROID_HOME=/home/runner/android-sdk
        # Build with verbose output
        buildozer android debug -v 2>&1 | tee build.log
        
    - name: List files
      run: |
        echo "=== Current directory ==="
        ls -la
        echo "=== Looking for APK files ==="
        find . -name "*.apk" -type f
        find . -name "build" -type d
        ls -la .buildozer/ 2>/dev/null || echo "No .buildozer directory"
        ls -la bin/ 2>/dev/null || echo "No bin directory"
        
    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        
    - name: Upload APK files
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: fileserver-apk
        path: |
          .buildozer/android/platform/build/dists/*.apk
          bin/*.apk
          **/*.apk
