name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.8
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer
        pip install cython
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          openjdk-11-jdk \
          build-essential \
          python3-dev \
          python3-pip \
          libffi-dev \
          libssl-dev \
          libxml2-dev \
          libxslt1-dev \
          zlib1g-dev \
          autoconf \
          libtool \
          pkg-config \
          libncurses5-dev \
          libncursesw5-dev \
          cmake \
          libltdl-dev
        
    - name: Build APK
      run: |
        buildozer android debug 2>&1 | tee build.log
        
    - name: List all files and directories
      run: |
        echo "=== Current directory structure ==="
        ls -la
        echo ""
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f -exec ls -lh {} \; 2>/dev/null || echo "No APK files found"
        echo ""
        echo "=== Listing .buildozer directory ==="
        ls -la .buildozer/ 2>/dev/null || echo ".buildozer directory not found"
        echo ""
        echo "=== Listing .buildozer/android directory ==="
        ls -la .buildozer/android/ 2>/dev/null || echo ".buildozer/android directory not found"
        
    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        
    - name: Upload APK files
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: fileserver-apk
        path: |
          .buildozer/android/platform/build/dists/*.apk
          .buildozer/android/platform/build/outputs/apk/debug/*.apk
          bin/*.apk
        retention-days: 30
