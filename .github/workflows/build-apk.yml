name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.8
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer
        pip install cython
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          openjdk-11-jdk \
          build-essential \
          python3-dev \
          python3-pip \
          libffi-dev \
          libssl-dev \
          libxml2-dev \
          libxslt1-dev \
          zlib1g-dev \
          autoconf \
          libtool \
          pkg-config \
          libncurses5-dev \
          libncursesw5-dev \
          cmake \
          libltdl-dev
        
    - name: Debug - List files
      run: |
        echo "Current directory:"
        pwd
        echo ""
        echo "Files in current directory:"
        ls -la
        echo ""
        echo "Checking buildozer.spec:"
        if [ -f buildozer.spec ]; then
          echo "buildozer.spec exists"
          head -n 20 buildozer.spec
        else
          echo "buildozer.spec NOT found!"
        fi
        
    - name: Build APK
      run: |
        buildozer android debug 2>&1 | tee build.log
        
    - name: Find APK files
      run: |
        echo "Searching for APK files..."
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
        echo ""
        echo "Listing bin directory:"
        ls -la bin/ 2>/dev/null || echo "bin directory not found"
        
    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: fileserver-apk
        path: |
          bin/*.apk
          .buildozer/android/platform/build/dists/*.apk
