name: Build Android APK (Optimized)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      ANDROID_SDK_ROOT: /home/runner/android-sdk
      ANDROID_HOME: /home/runner/android-sdk
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.8
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer
        pip install cython
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          openjdk-11-jdk \
          build-essential \
          python3-dev \
          python3-pip \
          libffi-dev \
          libssl-dev \
          libxml2-dev \
          libxslt1-dev \
          zlib1g-dev \
          autoconf \
          libtool \
          pkg-config \
          libncurses5-dev \
          libncursesw5-dev \
          cmake \
          libltdl-dev
        
    - name: Setup Android SDK
      run: |
        # Create Android SDK directory
        mkdir -p $ANDROID_SDK_ROOT
        
        # Download and install Android SDK Command Line Tools
        cd $ANDROID_SDK_ROOT
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-11076708_latest.zip
        rm commandlinetools-linux-11076708_latest.zip
        
        # Set up SDK tools directory structure
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/bin cmdline-tools/latest/
        mv cmdline-tools/lib cmdline-tools/latest/
        
        # Set PATH
        export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
        
        # Accept SDK licenses
        yes | sdkmanager --licenses
        
        # Install required components
        sdkmanager "build-tools;33.0.0"
        sdkmanager "platform-tools"
        sdkmanager "platforms;android-33"
        
        # Verify installation
        ls -la $ANDROID_SDK_ROOT/build-tools/
        ls -la $ANDROID_SDK_ROOT/platform-tools/
        
    - name: Build APK
      run: |
        # Set PATH
        export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
        
        # Build APK
        buildozer android debug 2>&1 | tee build.log
        echo "Build completed with exit code: $?"
        
    - name: List all files and directories
      run: |
        echo "=== Current directory ==="
        pwd
        ls -la
        echo ""
        echo "=== All directories ==="
        find . -type d -name ".buildozer" -o -name "bin" | head -20
        echo ""
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
        echo ""
        echo "=== Listing .buildozer directory ==="
        if [ -d ".buildozer" ]; then
          ls -la .buildozer/
          echo ""
          echo "=== Listing .buildozer/android directory ==="
          if [ -d ".buildozer/android" ]; then
            ls -la .buildozer/android/
            echo ""
            echo "=== Listing .buildozer/android/platform directory ==="
            if [ -d ".buildozer/android/platform" ]; then
              ls -la .buildozer/android/platform/
              echo ""
              echo "=== Listing .buildozer/android/platform/build directory ==="
              if [ -d ".buildozer/android/platform/build" ]; then
                ls -la .buildozer/android/platform/build/
                echo ""
                echo "=== Listing .buildozer/android/platform/build/dists directory ==="
                if [ -d ".buildozer/android/platform/build/dists" ]; then
                  ls -la .buildozer/android/platform/build/dists/
                fi
              fi
            fi
          fi
        else
          echo ".buildozer directory not found"
        fi
        echo ""
        echo "=== Listing bin directory ==="
        if [ -d "bin" ]; then
          ls -la bin/
        else
          echo "bin directory not found"
        fi
        
    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        
    - name: Upload APK files
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: fileserver-apk
        path: |
          .buildozer/android/platform/build/dists/*.apk
          .buildozer/android/platform/build/outputs/apk/debug/*.apk
          bin/*.apk
        retention-days: 30
        if-no-files-found: warn
