name: Build Hello World APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Build reason'
        required: false
        default: 'Manual build'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git openjdk-11-jdk build-essential python3-dev python3-pip libffi-dev libssl-dev libxml2-dev libxslt1-dev zlib1g-dev autoconf libtool pkg-config libncurses5-dev libncursesw5-dev cmake libltdl-dev
        
    - name: Create Hello World directory
      run: |
        mkdir -p hello_world
        cp hello_main.py hello_world/main.py
        
    - name: Build APK with Buildozer
      run: |
        cd hello_world
        # Initialize buildozer
        buildozer init
        # Configure buildozer.spec
        sed -i 's/orientation = all/orientation = landscape/g' buildozer.spec
        sed -i 's/requirements = python3,kivy/requirements = python3,kivy==2.1.0/g' buildozer.spec
        # Show configuration
        cat buildozer.spec
        # Create buildozer directories
        mkdir -p /home/runner/.buildozer/android/platform/
        # Set up Android SDK with license acceptance
        echo "=== Setting up Android SDK ==="
        mkdir -p /home/runner/android-sdk
        cd /home/runner/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-6514223_latest.zip
        unzip -q commandlinetools-linux-6514223_latest.zip
        rm commandlinetools-linux-6514223_latest.zip
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/bin cmdline-tools/lib cmdline-tools/source.properties cmdline-tools/latest/
        # Set environment variables
        export ANDROID_SDK_ROOT=/home/runner/android-sdk
        export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
        # Accept all licenses
        yes | sdkmanager --licenses > /dev/null 2>&1
        # Install build-tools
        sdkmanager "build-tools;33.0.0" "platform-tools" "platforms;android-33"
        # Create symlink for buildozer
        if [ -L /home/runner/.buildozer/android/platform/android-sdk ]; then
          rm /home/runner/.buildozer/android/platform/android-sdk
        fi
        ln -s /home/runner/android-sdk /home/runner/.buildozer/android/platform/android-sdk
        # Go back to project directory
        cd /home/runner/work/fileserver/fileserver/hello_world
        # Build with verbose output
        buildozer android debug -v 2>&1 | tee build.log
        
    - name: List files
      run: |
        ls -la
        ls -la hello_world/
        find hello_world -name "*.apk" -type f
        
    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: hello-world-build-artifacts
        path: |
          hello_world/build.log
          hello_world/**/*.apk
